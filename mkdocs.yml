site_name: Auto Research
site_description: 从工业论文复现到方向驱动、多轮迭代的自动化机器学习研究平台
site_url: https://daiwk.github.io/auto-research/
repo_url: https://github.com/daiwk/auto-research
repo_name: daiwk/auto-research
edit_uri: edit/main/docs/

nav:
  - 首页: index.md
  - Auto Research:
      - 自动研究总览: auto-research.md
      - 模型定向进化: model-evolution.md
  - 论文复现:
      - 复现总览: reproductions/README.md
      - 按公司浏览: reproductions/catalog/by-company.md
      - 按主题浏览: reproductions/catalog/by-topic.md
      - 按年月浏览: reproductions/catalog/by-month.md
  - 项目文档:
      - 项目 README: project-readme.md
      - 架构与扩展: architecture.md
      - GPU 与 Linux CPU: runtime.md
      - 本地预览与发布: getting-started.md
      - 设计记录: design/automated-w2s-adoption.md

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

strict: true
