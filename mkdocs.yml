site_name: Auto Research 论文复现库
site_description: 工业推荐、生成式推荐与 LLM 论文的可复现实验文档
site_url: https://daiwk.github.io/auto-research/
repo_url: https://github.com/daiwk/auto-research
repo_name: daiwk/auto-research
edit_uri: edit/main/docs/

nav:
  - 论文复现库: index.md
  - 模型自动进化: model-evolution.md
  - 架构与扩展: architecture.md
  - 本地预览与发布: getting-started.md
  - 设计记录:
      - 自动化研究架构采用记录: design/automated-w2s-adoption.md
  - 复现总览:
      - 全部论文: reproductions/README.md
      - 按公司: reproductions/catalog/by-company.md
      - 按主题: reproductions/catalog/by-topic.md
      - 按年月: reproductions/catalog/by-month.md

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

strict: true
